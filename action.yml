name: 'Greeting Generator Composite Action'
description: 'A composite action to greet someone'

inputs:
  who-to-greet:  # id of input
    description: 'Who to greet'
    required: true
    default: 'Saikat'

outputs:
  message:
    description: "The greeting message"
    value: ${{ steps.greeting.outputs.message }}

runs:
  using: "composite"
  steps:
    - name: Set Greeting
      shell: bash
      id: greeting
      run: |
        echo "message=Hello ${{ inputs.who-to-greet }}!" >> $GITHUB_OUTPUT
